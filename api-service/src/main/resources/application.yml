spring:
  application:
    name: api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/edrdog}
    username: ${DB_USER:edrdog}
    password: ${DB_PASSWORD:edrdog}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8084

edrdog:
  api:
    key: ${EDRDOG_API_KEY:dev-api-key}   # 프론트가 X-API-Key 헤더로 보낼 값 (운영은 환경변수로 주입)
  clickhouse:
    url: http://localhost:8123           # k8s NodePort HTTP (archiver 와 동일 DB, 읽기)
    database: edrdog
    user: edrdog
    password: edrdog
    table: edrdog.events                 # 조회 대상 테이블 (archiver 가 적재)

management:
  endpoints:
    web:
      exposure:
        include: health, info
