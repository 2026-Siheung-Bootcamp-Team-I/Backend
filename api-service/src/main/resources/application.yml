spring:
  application:
    name: api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/edrdog}
    username: ${DB_USER:edrdog}
    password: ${DB_PASSWORD:edrdog}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: api-alerts
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: com.edrdog.apiservice.alert.dto.Alert
        spring.json.trusted.packages: com.edrdog.apiservice.alert.dto
    producer:                            # osquery 수집 원시 로그를 events-raw 로 발행(문자열)
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8084

edrdog:
  kafka:
    alerts-topic: alerts                 # detector 가 발행한 판정 결과 (소비 → MySQL 적재)
    events-raw-topic: events-raw         # osquery 수집 원시 result-log (발행 → collector 정규화)
  osquery:
    tls:                                 # osquery 전용 HTTPS 커넥터 (프론트 HTTP 8084 와 별도 포트)
      enabled: ${OSQUERY_TLS_ENABLED:false}          # 켜면 keystore 필수 (scripts/gen-dev-keystore.sh)
      port: ${OSQUERY_TLS_PORT:8443}
      keystore: ${OSQUERY_TLS_KEYSTORE:}             # PKCS12 경로 또는 classpath:...
      keystore-password: ${OSQUERY_TLS_KEYSTORE_PASSWORD:changeit}
      keystore-type: PKCS12
      key-alias: ${OSQUERY_TLS_KEY_ALIAS:osquery}
  api:
    key: ${EDRDOG_API_KEY:dev-api-key}   # 프론트가 X-API-Key 헤더로 보낼 값 (운영은 환경변수로 주입)
  demo:
    # 발표용 시드. 켜면 부팅 시 데모 계정(test/1234, tenantId=1)과 최근 7일치 과거 데이터를 만든다.
    # 운영에 test/1234 가 새면 안 되므로 기본은 off. 발표 환경에서만 DEMO_SEED=true 로 켠다.
    seed: ${DEMO_SEED:false}
  cors:
    # 브라우저에서 API 를 호출할 프론트 출처 (쉼표 구분). 기본값은 Vite dev 서버.
    # 배포 시엔 실제 프론트 도메인을 환경변수로 주입한다.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  internal:
    key: ${INTERNAL_API_KEY:dev-internal-key}   # 서비스 간 내부 조회 전용 키 (프론트 X-API-Key 와 분리, X-Internal-Key 헤더)
  clickhouse:
    url: http://localhost:8123           # k8s NodePort HTTP (archiver 와 동일 DB, 읽기)
    database: edrdog
    user: edrdog
    password: edrdog
    table: edrdog.events                 # 조회 대상 테이블 (archiver 가 적재)

management:
  endpoints:
    web:
      exposure:
        include: health, info
