spring:
  application:
    name: alert
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: alert
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: com.edrdog.alert.dto.Alert
        spring.json.trusted.packages: com.edrdog.alert.dto

server:
  port: 8083

edrdog:
  kafka:
    alerts-topic: alerts        # detector 가 발행한 판정 결과 (소비 입력)
  alert:
    cooldown-ms: 60000          # 같은 host+ruleId 중복 발송 억제 창
  slack:
    webhook-url: ${SLACK_WEBHOOK_URL:}   # Slack Incoming Webhook URL (미설정 시 발송 skip)

management:
  endpoints:
    web:
      exposure:
        include: health, info
