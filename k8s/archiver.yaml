apiVersion: apps/v1
kind: Deployment
metadata:
  name: archiver
  namespace: edrdog
  labels:
    app: archiver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: archiver
  template:
    metadata:
      labels:
        app: archiver
    spec:
      containers:
        - name: archiver
          # 배포 시 CI 가 kubectl set image 로 실제 태그(:<sha>) 주입
          image: ghcr.io/2026-siheung-bootcamp-team-i/backend/archiver:latest
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9094"
            - name: EDRDOG_CLICKHOUSE_URL
              value: "http://clickhouse:8123"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: archiver
  namespace: edrdog
  labels:
    app: archiver
spec:
  selector:
    app: archiver
  ports:
    - port: 80
      targetPort: 8083
