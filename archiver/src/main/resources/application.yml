spring:
  application:
    name: archiver
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: archiver
      auto-offset-reset: earliest       # 적재는 유실 없이 처음부터 (detector 와 독립 그룹)
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: com.edrdog.archiver.dto.Event
        spring.json.trusted.packages: com.edrdog.archiver.dto

server:
  port: 8083

edrdog:
  kafka:
    events-topic: events              # 원시 이벤트 (소비 입력)
    alerts-topic: alerts              # 판정 결과 (소비 입력)
  clickhouse:
    url: ${CLICKHOUSE_URL:http://localhost:8123}   # k8s NodePort HTTP
    database: ${CLICKHOUSE_DATABASE:edrdog}
    user: ${CLICKHOUSE_USER:edrdog}
    password: ${CLICKHOUSE_PASSWORD:edrdog}        # 운영은 시크릿(Infisical)으로 주입
    table: edrdog.events              # 적재 대상 테이블
    detections-table: edrdog.detections  # 판정 결과 적재 대상 테이블

management:
  endpoints:
    web:
      exposure:
        include: health, info
