{
  "//": "EDRdog osquery 설정 (Windows). process_etw_events(ETW) 로 프로세스 생성을 감시하고, file_events(FIM) 로 시작프로그램 경로를 감시해 kafka_producer 로 events-raw 에 전송.",
  "//network": "core osquery 는 Windows 실시간 네트워크(소켓) 이벤트 테이블이 없다. network 이벤트는 Zeek 가 담당(플랫폼 공통).",
  "//type": "process_etw_events.type 의 정확한 리터럴(예: 'ProcessStart')은 osquery 버전에 따라 다를 수 있으니 실제 호스트에서 'SELECT DISTINCT type FROM process_etw_events;' 로 확인 후 WHERE 를 맞출 것.",
  "//routing": "collector 의 RawEventMapper 가 쿼리명으로 type 판정: script->script, file->file, 그 외 process.",

  "options": {
    "disable_events": false,
    "host_identifier": "hostname",
    "schedule_splay_percent": 10
  },

  "kafka_topics": {
    "events-raw": ["process_etw_events", "script_etw_events", "file_events"]
  },

  "file_paths": {
    "autorun": [
      "C:\\Users\\%\\AppData\\Roaming\\Microsoft\\Windows\\Start Menu\\Programs\\Startup\\%%",
      "C:\\ProgramData\\Microsoft\\Windows\\Start Menu\\Programs\\StartUp\\%%"
    ]
  },

  "schedule": {
    "process_etw_events": {
      "//": "프로세스 생성만. parent(부모명)는 ppid 를 processes 에 조인해 이름으로 채운다.",
      "query": "SELECT e.path AS path, e.cmdline AS cmdline, p.name AS parent FROM process_etw_events e LEFT JOIN processes p ON e.ppid = p.pid WHERE e.type = 'ProcessStart';",
      "interval": 10,
      "removed": false
    },
    "script_etw_events": {
      "//": "스크립트 인터프리터 실행만. cmdline 에 스크립트 경로가 담겨, 임시/다운로드 경로 실행을 detector 가 MEDIUM(T1059)으로 판정한다.",
      "query": "SELECT e.path AS path, e.cmdline AS cmdline, p.name AS parent FROM process_etw_events e LEFT JOIN processes p ON e.ppid = p.pid WHERE e.type = 'ProcessStart' AND (e.path LIKE '%\\powershell.exe' OR e.path LIKE '%\\cmd.exe' OR e.path LIKE '%\\wscript.exe' OR e.path LIKE '%\\cscript.exe' OR e.path LIKE '%\\mshta.exe');",
      "interval": 10,
      "removed": false
    },
    "file_events": {
      "//": "FIM: 시작프로그램(Startup) 경로의 파일 생성/변경 감시. target_path 전체를 detector 가 지속성(T1547) 판정에 쓴다. file_paths.autorun 참조.",
      "query": "SELECT target_path, action FROM file_events WHERE action IN ('CREATED', 'UPDATED', 'MOVED_TO');",
      "interval": 10,
      "removed": false
    }
  }
}
