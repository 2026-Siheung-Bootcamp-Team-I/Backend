{
  "//": "배관 검증 전용. processes 를 5초 간격 차등 쿼리 -> 새 프로세스가 뜰 때마다 events-raw 로 전송. FDA 불필요.",
  "//parent": "processes.parent 는 부모 PID(숫자)다. 배관 증명이 목적이라 그대로 둔다(es_process_events 는 조인으로 이름).",

  "options": {
    "schedule_splay_percent": 1
  },

  "kafka_topics": {
    "events-raw": ["processes"]
  },

  "schedule": {
    "processes": {
      "query": "SELECT path, cmdline, parent FROM processes;",
      "interval": 5,
      "removed": false
    }
  }
}
