{
  "//": "EDRdog osquery 설정 (macOS). es_process_events(EndpointSecurity) + socket_events 를 kafka_producer 로 events-raw 토픽에 전송한다.",
  "//kafka": "실제 Kafka 전송 플래그(--logger_plugin=kafka_producer 등)는 osquery.flags 로 넘긴다. 아래 kafka_topics 는 쿼리명->토픽 라우팅.",

  "options": {
    "disable_events": false,
    "disable_endpointsecurity": false,
    "host_identifier": "hostname",
    "schedule_splay_percent": 10
  },

  "kafka_topics": {
    "events-raw": ["process_events", "socket_events"]
  },

  "schedule": {
    "process_events": {
      "//": "es_process_events: 프로세스 생성 감시. parent 는 PID 라 processes 조인으로 이름을 넣어 collector 가 그대로 쓰게 한다.",
      "query": "SELECT e.path AS path, e.cmdline AS cmdline, p.name AS parent FROM es_process_events e LEFT JOIN processes p ON e.parent = p.pid WHERE e.event_type = 'exec';",
      "interval": 10,
      "removed": false
    },
    "socket_events": {
      "//": "아웃바운드 연결만(remote_address 존재, connect). C2 비컨 탐지 입력.",
      "query": "SELECT path, remote_address, remote_port FROM socket_events WHERE action = 'connect' AND remote_address != '' AND remote_address NOT IN ('127.0.0.1', '::1', '0.0.0.0');",
      "interval": 10,
      "removed": false
    }
  }
}
